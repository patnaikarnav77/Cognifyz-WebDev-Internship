<!DOCTYPE html>
<html>
<body style="text-align:center;padding:50px">
  <button onclick="greet()" style="padding:15px 30px">Show Greeting</button>
  <script>
    function greet(){
      const hour = new Date().getHours();
      let msg = hour < 12 ? "Good Morning!" : hour < 18 ? "Good Afternoon!" : "Good Evening!";
      alert(msg);
    }
  </script>
</body>
</html>
